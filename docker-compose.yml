# =====================================================================
# docker-compose.yml — CV Personal Freddy Chumacero
# Diplomado Full Stack Developer Back End Front End - USIP 2026
#
# Servicios:
#   - database  → MySQL 8.0              (puerto 3306)
#   - backend   → Node.js 20 / Express   (puerto 4000)
#   - frontend  → React + Nginx 1.27     (puerto 3000)
#
# Ejecución: docker compose up -d
# Acceso:    http://localhost:3000
# =====================================================================

version: '3.9'

services:

  # ── Base de datos MySQL ──────────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: cv_database
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cv_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cv_network

  # ── Backend Node.js ──────────────────────────────────────────────
  backend:
    image: freddychumacero/chumacero-backend:v1
    container_name: cv_backend
    environment:
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: cv_db
    ports:
      - "4000:4000"
    depends_on:
      - database
    restart: always
    networks:
      - cv_network

  # ── Frontend React + Nginx ───────────────────────────────────────
  frontend:
    image: freddychumacero/chumacero-frontend:v1
    container_name: cv_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cv_network

# ── Volumen para persistencia de MySQL ──────────────────────────────
volumes:
  mysql_data:

# ── Red única Docker ─────────────────────────────────────────────────
networks:
  cv_network:
